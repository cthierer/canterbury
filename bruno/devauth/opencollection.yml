opencollection: 1.0.0

info:
  name: devauth
config:
  protobuf:
    protoFiles:
      - type: file
        path: ../../api/canterbury/dev/v1/auth.proto
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ''
      port: ''
      auth:
        username: ''
        password: ''
      bypassProxy: ''
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
