address: :8443
authenticate_service_url: https://authenticate.localhost.pomerium.io:8443
certificate_file: /pomerium/certs/pomerium-local.crt
certificate_key_file: /pomerium/certs/pomerium-local.key
cookie_secret: __POMERIUM_COOKIE_SECRET__
idp_client_id: __DEX_CLIENT_ID__
idp_client_secret: __DEX_CLIENT_SECRET__
idp_provider: oidc
idp_provider_url: http://dex.localhost.pomerium.io:5556/dex
idp_scopes: openid,profile,email
shared_secret: __POMERIUM_SHARED_SECRET__
signing_key_file: /pomerium/keys/pomerium-signing-key.pem

routes:
  - from: https://vault.localhost.pomerium.io
    path: /mcp
    to: http://mcp-server:50053
    allow_any_authenticated_user: true
    bearer_token_format: idp_identity_token
    pass_identity_headers: true
    set_request_headers:
      Authorization: Bearer ${pomerium.jwt}
  - from: https://vault.localhost.pomerium.io
    to: http://vault-service:50051
    allow_any_authenticated_user: true
    bearer_token_format: idp_identity_token
    pass_identity_headers: true
    set_request_headers:
      Authorization: Bearer ${pomerium.jwt}
